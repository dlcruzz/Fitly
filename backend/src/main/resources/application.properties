# ==============================
# Configurações do Servidor
# ==============================
server.port=8080
spring.application.name=fitly-api

# ==============================
# Banco de Dados Oracle
# ==============================
spring.datasource.url=jdbc:oracle:thin:@SEU_HOST:1521/SEU_SERVICE_NAME
spring.datasource.username=SEU_USUARIO_ORACLE
spring.datasource.password=SUA_SENHA_ORACLE
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ==============================
# JWT
# ==============================
jwt.secret=SEU_SECRET_JWT_DEVE_TER_PELO_MENOS_256_BITS_DE_COMPRIMENTO
jwt.expiracao-ms=86400000
jwt.refresh-expiracao-ms=604800000

# ==============================
# Logs
# ==============================
logging.level.org.springframework.security=DEBUG
logging.level.com.fitly=DEBUG
